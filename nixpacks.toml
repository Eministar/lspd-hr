# Nixpacks build configuration for LSPD HR Dashboard
# Works with Railway, Render, Fly.io, Coolify, and any Nixpacks-compatible host.
# Docs: https://nixpacks.com/docs/configuration/

[variables]
    # Tell Next.js the public URL at build time (override in your host if needed)
    NIXPACKS_NODE_VERSION = "22"
    NODE_ENV = "production"
    NEXT_TELEMETRY_DISABLED = "1"

[phases.setup]
    nixPkgs = ["nodejs-22_x", "git", "npm-9_x"]

[phases.install]
    cmds = [
        "npm ci --no-audit --no-fund --loglevel=error",
    ]

[phases.build]
    cmds = [
        "npx prisma generate",
        "npx prisma db push --accept-data-loss --skip-generate || true",
        "npm run build",
    ]

[start]
    cmd = "npx prisma migrate deploy || true && npx next start -p ${PORT:-3000} -H 0.0.0.0"
